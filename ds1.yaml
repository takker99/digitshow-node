# Sample Calibration Configuration for Modbus RTU Soil Testing
# This file demonstrates the calibration configuration format
#
# Calibration factors are variable-length arrays representing polynomial coefficients:
# [a0, a1, a2, ...] = a0 + a1*x + a2*x^2 + a3*x^3 + ...

inputs:
  "0":
    name: "Shear LC"
    factors: [0, 0.000241353]
  "1":
    name: "Vertical LC"
    factors: [0, 0.000310774]
  "2":
    name: "Shear LVDT"
    factors: [0, 0.000703225]
  "3":
    name: "Front Vertical LVDT"
    factors: [0, 0.000237645]
  "4":
    name: "Rear Vertical LVDT"
    factors: [0, 0.000237689]
  "5":
    name: "Front Friction LC"
    factors: [0, 0.00004399001]
  "6":
    name: "Rear Friction LC"
    factors: [0, 0.00004399001]
  "7":
    name: "Shear LVDT 2"
    factors: [0, 0.000236096]

outputs:
  "0":
    name: "Water Valve"
    factors: [0, 1]  # Direct mapping (identity)
    enabled: false
  "1":
    name: "Nutrient Pump"
    factors: [0, 1]  # Direct mapping
    enabled: false
