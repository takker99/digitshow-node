# Sample Calibration Configuration for Modbus RTU Soil Testing
# This file demonstrates the calibration configuration format
#
# Calibration factors are variable-length arrays representing polynomial coefficients:
# [a0, a1, a2, ...] = a0 + a1*x + a2*x^2 + a3*x^3 + ...
#
# Channel IDs:
# - Input: AI00, AI01, ..., AI15 (16 channels)
# - Output: AO00, AO01, ..., AO07 (8 channels)

inputs:
  AI00:
    name: "Moisture Sensor 1"
    factors: [0, 0.1, 0.0001] # Quadratic: 0 + 0.1*x + 0.0001*x^2
  AI01:
    name: "Moisture Sensor 2"
    factors: [0, 0.1, 0.0001]
  AI02:
    name: "Temperature Sensor"
    factors: [-40, 0.01] # Linear: -40 + 0.01*x
  AI03:
    name: "Advanced Sensor"
    factors: [1, 0.5, 0.001, 0.00001] # Cubic polynomial
  AI08:
    name: "pH Sensor"
    factors: [0, 0.001] # Linear
  AI09:
    name: "EC Sensor"
    factors: [0, 0.01] # Linear

outputs:
  AO00:
    name: "Water Valve"
    factors: [0, 1] # Direct mapping (identity)
  AO01:
    name: "Nutrient Pump"
    factors: [0, 1] # Direct mapping
